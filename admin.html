<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Gestión Cloud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-view">
    <nav class="navbar admin-navbar">
        <div class="logo">ADMIN<span>PANEL</span></div>
        <button onclick="window.location.href='index.html'" class="btn-logout">Cerrar Sesión</button>
    </nav>

    <div class="container">
        <div class="admin-hero">
            <h2>Mantenimiento de Contenidos</h2>
            <p>Sube imágenes, modifica descripciones o elimina registros de la nube.</p>
        </div>

        <div class="management-card">
            <h3>Carga de Archivos Cloud</h3>
            <div class="upload-grid">
                <div class="input-group"><label>Semana</label><input type="number" min="1" max="16" placeholder="00"></div>
                <div class="input-group"><label>Imagen</label><input type="file" accept="image/*"></div>
                <div class="input-group"><label>PDF/Doc</label><input type="file"></div>
                <button class="btn-save-cloud">Sincronizar Cloud</button>
            </div>
        </div>

        <div class="grid-proyectos" id="contenedor-editar"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
