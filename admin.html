<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - Gestión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f4f7f6;">
    <nav class="navbar" style="background-color: #1a252f;">
        <div class="logo">Panel de Administrador</div>
        <button onclick="window.location.href='index.html'" class="btn-auth" style="background:#e74c3c">Cerrar Sesión</button>
    </nav>

    <header class="hero" style="background: white; border-bottom: 1px solid #eee;">
        <h1>Gestión de Portafolio</h1>
        <p>Configuración de imágenes y archivos para las 16 semanas.</p>
    </header>

    <section class="container">
        <div class="upload-box">
            <h3>Subir Material Semanal</h3>
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; align-items: center;">
                <select id="semana-select">
                    <option value="">Elegir Semana...</option>
                    <option value="1">Semana 1</option>
                    <option value="2">Semana 2</option>
                    <option value="3">Semana 3</option>
                    <option value="4">Semana 4</option>
                    <!-- Las demás se pueden agregar manualmente -->
                </select>
                <label>Imagen: <input type="file" accept="image/*"></label>
                <label>Archivo: <input type="file"></label>
                <button class="btn-auth" style="background: #27ae60;">Guardar Todo</button>
            </div>
        </div>

        <!-- Cuadrícula 4x4 con opciones de edición -->
        <div class="grid-proyectos" id="contenedor-editar"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
