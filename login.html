<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Admin | BD-II</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <h2>Panel de Gestión</h2>
        <p>Introduce credenciales para editar el portafolio</p>
        <div class="login-form">
            <input type="text" id="user" placeholder="Nombre de usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button onclick="validarAcceso()" class="btn-primary-block">Acceder al Sistema</button>
        </div>
        <a href="index.html" class="link-back">Regresar al sitio principal</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
