<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Portafolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f2f5; margin:0;">
    <div style="background:white; padding:40px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:320px; text-align:center;">
        <h2 style="color:#2c3e50; margin-bottom:20px;">Acceso Admin</h2>
        <input type="text" id="user" placeholder="Usuario" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
        <input type="password" id="pass" placeholder="Contraseña" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
        <button onclick="validarAcceso()" class="btn-auth" style="width:100%; margin-top:15px; padding:12px;">Entrar al Panel</button>
        <p style="margin-top:20px;"><a href="index.html" style="text-decoration:none; color:#3498db; font-size:0.9rem;">← Volver al Inicio</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
